services:
  - type: web
    name: joysky-8d-converter
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: USE_AI
        value: "1"
      - key: APP_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
